# ============================================================
# progreg-sec-webapp application properties
# ============================================================

# Active Spring profile – typically overridden at build time
# via the Maven profile (-Pokta / -Pwebsphere / -Pdb) which
# substitutes this value into web.xml via Maven filtering, or
# at runtime via the WebSphere JVM custom property:
#   spring.profiles.active=okta
#
# Valid values: okta | websphere | db
spring.profiles.active=${spring.active.profiles}

# ============================================================
# Okta / OAuth2 configuration  (spring.profiles.active=okta)
# ============================================================
# Uncomment and fill in the values for your Okta application.
#
# spring.security.oauth2.client.registration.okta.client-id=<your-client-id>
# spring.security.oauth2.client.registration.okta.client-secret=<your-client-secret>
# spring.security.oauth2.client.registration.okta.scope=openid,profile,email,groups
# spring.security.oauth2.client.provider.okta.issuer-uri=https://<your-okta-domain>/oauth2/default
#
# To map Okta groups to Spring Security granted authorities, configure a
# custom OidcUserService or use Okta's groups claim in the JWT.

# ============================================================
# WebSphere profile  (spring.profiles.active=websphere)
# ============================================================
# No additional properties required.  WebSphere handles authentication
# via LTPA/SPNEGO/TAI.  Ensure the security roles (USER, ADMIN, MANAGER)
# are mapped to WebSphere groups in the application bindings.

# ============================================================
# DB profile  (spring.profiles.active=db)
# ============================================================
# No additional properties required here.  The datasource is obtained
# from JNDI (jdbc/progreg) as configured in WebSphere and bound in
# ibm-web-bnd.xml.  Ensure the target database contains the
# Spring Security JDBC schema (users + authorities tables).
